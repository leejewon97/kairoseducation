<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairos Education | Select Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A1628; --navy-mid: #12243F; --navy-light: #1C3458;
      --gold: #C9A84C; --gold-light: #E8C96C;
      --white: #FFFFFF; --off-white: #F8F7F4;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      background-image: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(201,168,76,0.08) 0%, transparent 60%);
      display: flex; align-items: center; justify-content: center;
      color: var(--white);
    }
    .container { text-align: center; max-width: 600px; padding: 40px 20px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 600; margin-bottom: 8px; }
    .logo span { color: var(--gold); }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 48px; }
    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .lang-card {
      display: block; padding: 28px 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px; text-decoration: none; color: var(--white);
      transition: all 0.25s;
    }
    .lang-card:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); transform: translateY(-2px); }
    .lang-card .native { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .lang-card .label { font-size: 13px; color: rgba(255,255,255,0.5); }
    @media (max-width: 480px) { .lang-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Kairos<span>.</span></div>
    <div class="subtitle">Select Your Language</div>
    <div class="lang-grid">
      <a href="/en/" class="lang-card"><div class="native">English</div><div class="label">English</div></a>
      <a href="/ko/" class="lang-card"><div class="native">한국어</div><div class="label">Korean</div></a>
      <a href="/zh/" class="lang-card"><div class="native">中文</div><div class="label">Chinese</div></a>
      <a href="/th/" class="lang-card"><div class="native">ภาษาไทย</div><div class="label">Thai</div></a>
    </div>
  </div>
</body>
</html>
