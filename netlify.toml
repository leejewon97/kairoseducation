[build]
  publish = "public"

# 예전 /en/, /ko/ … → 홈에서 US / Study in KR 선택
[[redirects]]
  from = "/en"
  to = "/?lang=en"
  status = 302

[[redirects]]
  from = "/en/*"
  to = "/?lang=en"
  status = 302

[[redirects]]
  from = "/ko"
  to = "/?lang=ko"
  status = 302

[[redirects]]
  from = "/ko/*"
  to = "/?lang=ko"
  status = 302

[[redirects]]
  from = "/zh"
  to = "/?lang=zh"
  status = 302

[[redirects]]
  from = "/zh/*"
  to = "/?lang=zh"
  status = 302

[[redirects]]
  from = "/th"
  to = "/?lang=th"
  status = 302

[[redirects]]
  from = "/th/*"
  to = "/?lang=th"
  status = 302

# 예전 /us.html 북마크
[[redirects]]
  from = "/us.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/assets/us-site.css"
  to = "/assets/origin-site.css"
  status = 301

[[redirects]]
  from = "/assets/us-locale.js"
  to = "/assets/origin-locale.js"
  status = 301
